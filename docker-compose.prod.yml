services:
  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: redacao-worker
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - LOG_LEVEL=info
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
