services:
  redis:
    image: redis:7-alpine
    container_name: redis-worker
    ports:
      - "127.0.0.1:6379:6379"
    command: redis-server --requirepass Redaline2025@ --appendonly yes
    volumes:
      - redis-data:/data
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "redis-cli", "-a", "Redaline2025@", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: redacao-worker
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=Redaline2025@
      - REDIS_DB=0
      - NODE_ENV=development
      - LOG_LEVEL=info
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - redacao-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  redis-data:
    driver: local

networks:
  redacao-network:
    driver: bridge
